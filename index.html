<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Thi - Thầy Tráng</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --bg: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); }
        
        /* === HEADER & ĐỒNG HỒ ĐẾM NGƯỢC (Đã fix lỗi đè giao diện) === */
        .header { background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%); color: white; padding: 30px 15px; text-align: center; }
        .header h1 { margin: 0; font-size: clamp(1.4em, 4vw, 2.5em); text-shadow: 1px 1px 3px rgba(0,0,0,0.2); line-height: 1.3; }
        .header p { margin-top: 10px; font-size: clamp(0.9em, 2.5vw, 1.1em); opacity: 0.9; }
        
        .countdown-wrapper { display: flex; justify-content: center; margin-top: 25px; margin-bottom: 10px; }
        .countdown-container {
            background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%);
            color: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-block; border: 2px solid rgba(255,255,255,0.2);
        }
        .countdown-container h2 { margin: 0 0 10px 0; font-size: clamp(0.9em, 3vw, 1.2em); text-transform: uppercase; letter-spacing: 0.5px; }
        #countdown { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .time-box {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px);
            padding: 5px 10px; border-radius: 8px; min-width: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .time-box span { display: block; font-size: clamp(1.4em, 5vw, 2em); font-weight: 800; line-height: 1; margin-bottom: 3px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .time-box small { font-size: 0.7em; text-transform: uppercase; font-weight: 600; opacity: 0.9; }

        /* === KHUNG DANH SÁCH ĐỀ THI === */
        .container { max-width: 1200px; margin: 30px auto 40px auto; padding: 0 15px; position: relative; z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #E5E7EB; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #A5B4FC; }
        .card-title { font-size: 1.2em; font-weight: 700; color: var(--primary); margin: 0 0 15px 0; border-bottom: 2px solid #EEF2FF; padding-bottom: 10px; line-height: 1.4; }
        .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.95em; color: var(--text-muted); }
        .stat-row i { width: 24px; color: #8B5CF6; text-align: center; margin-right: 8px; }
        .stat-value { font-weight: 600; color: var(--text-main); margin-left: auto; text-align: right; }
        .ky-luc-badge { background: #FEF3C7; color: #D97706; padding: 4px 8px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .btn-start { margin-top: auto; padding: 12px; background-color: var(--primary); color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; display: block; transition: all 0.2s; }
        .btn-start:hover { background-color: var(--primary-hover); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> NGÂN HÀNG ĐỀ THI THỬ TNTHPTQG MÔN TOÁN 2026</h1>
        <p>Giáo viên: Nguyễn Ngọc Tráng - THPT Đào Sơn Tây</p>
        
        <div class="countdown-wrapper">
            <div class="countdown-container">
                <h2><i class="fas fa-stopwatch"></i> Đếm ngược Kỳ thi TN THPT 2026</h2>
                <div id="countdown">
                    <div class="time-box"><span id="days">00</span><small>Ngày</small></div>
                    <div class="time-box"><span id="hours">00</span><small>Giờ</small></div>
                    <div class="time-box"><span id="minutes">00</span><small>Phút</small></div>
                    <div class="time-box"><span id="seconds">00</span><small>Giây</small></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="grid" id="test-grid"></div>
    </div>

    <script>
        /* === 1. THIẾT LẬP NGÀY THI TN THPT (Năm-Tháng-Ngày) === */
        const EXAM_DATE = new Date("2026-06-11T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = EXAM_DATE - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<h3 style='margin: 10px 0;'>CHÚC CÁC SĨ TỬ THI TỐT!</h3>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        /* === 2. TỪ KHÓA BÍ MẬT CỦA TOOL PYTHON === */
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxUoVEDp-vTKSnstMcDyBqVXZfj0N1YL71NRsiK-pkZ4cQ6xhXb1NCRuSFMqfzcBs6klA/exec";
        const tests = [ { fileName: 'DE1_final - Copy_interactive.html', displayName: 'THPT YÊN MÔ B - NINH BÌNH', date: '21/03/2026' },
            { fileName: 'DE2_final - Copy_interactive.html', displayName: 'THPT CHUYÊN ĐH KHTN HÀ NỘI', date: '21/03/2026' },
            { fileName: 'DE3_final - Copy_interactive.html', displayName: 'Cụm liên trường Nghệ An lần 1', date: '21/03/2026' } ];
        /* ========================================= */
        
        const CACHE_KEY = "quiz_stats_cache_v5";
        const grid = document.getElementById('test-grid');
        
        tests.forEach(test => {
            const safeId = test.fileName.replace(/[^a-zA-Z0-9]/g, '_');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3 class="card-title">${test.displayName}</h3>
                <div class="stat-row"><i class="far fa-calendar-alt"></i> Ngày đăng: <span class="stat-value">${test.date}</span></div>
                <div class="stat-row"><i class="fas fa-check-circle"></i> Đã nộp bài: <span class="stat-value" id="luot_${safeId}">...</span></div>
                <div class="stat-row" style="margin-bottom: 20px;"><i class="fas fa-trophy"></i> Kỷ lục: <span class="stat-value ky-luc-badge" id="kyluc_${safeId}">...</span></div>
                <a href="${test.fileName}" target="_blank" class="btn-start"><i class="fas fa-pen"></i> BẮT ĐẦU THỦ TỤC LÀM BÀI</a>
            `;
            grid.appendChild(card);
        });

        function renderStats(statsMap) {
            tests.forEach(test => {
                const safeId = test.fileName.replace(/[^a-zA-Z0-9]/g, '_');
                let searchKey = String(test.displayName).trim().toLowerCase();
                let stat = statsMap[searchKey] || Object.keys(statsMap).find(k => k.includes(searchKey) || searchKey.includes(k)) && statsMap[Object.keys(statsMap).find(k => k.includes(searchKey) || searchKey.includes(k))];
                
                const spanLuot = document.getElementById('luot_' + safeId);
                const spanKyLuc = document.getElementById('kyluc_' + safeId);
                
                if (stat) {
                    spanLuot.innerText = stat.count + " lượt";
                    // HIỂN THỊ: CHỈ ĐIỂM VÀ FULL HỌ TÊN NGƯỜI DÙNG (Giấu thời gian đi)
                    spanKyLuc.innerText = stat.topScore + "đ (" + stat.topName + ")"; 
                } else {
                    spanLuot.innerText = "0 lượt"; spanKyLuc.innerText = "Chưa có";
                    spanKyLuc.style.background = "#F3F4F6"; spanKyLuc.style.color = "#9CA3AF";
                }
            });
        }

        const cachedData = localStorage.getItem(CACHE_KEY);
        if (cachedData) { try { renderStats(JSON.parse(cachedData)); } catch(e) {} }

        async function fetchStatsSilently() {
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const json = await response.json();
                if (json.result === 'success') {
                    const data = json.data; let statsMap = {};
                    
                    data.forEach(row => {
                        let rawTenDe = row['TenDe'] || row['Tên Đề'] || ''; 
                        if (rawTenDe) {
                            let key = String(rawTenDe).trim().toLowerCase();
                            
                            if (!statsMap[key]) statsMap[key] = { count: 0, topScore: -1, topTime: 999999, topName: '' };
                            statsMap[key].count++; 
                            
                            let diem = parseFloat(row['DiemSo']) || 0;
                            let hoTen = String(row['HoTen'] || 'Ẩn danh');
                            let timeStr = String(row['ThoiGianLamBai'] || '');
                            
                            // LOGIC ÂM THẦM DỊCH THỜI GIAN (Xử lý mượt mà cả chuỗi 1899-12... của Google Sheets)
                            let timeSecs = 999999;
                            if (timeStr.includes('T')) {
                                let d = new Date(timeStr);
                                if (!isNaN(d.getTime())) {
                                    timeSecs = d.getUTCHours() * 3600 + d.getUTCMinutes() * 60 + d.getUTCSeconds();
                                }
                            } else {
                                let parts = timeStr.split(':').reverse(); // Tách giây, phút, giờ
                                if (parts.length >= 2) { 
                                    timeSecs = (parseInt(parts[0])||0) + (parseInt(parts[1])||0)*60 + (parseInt(parts[2])||0)*3600; 
                                }
                            }

                            // SO SÁNH: Điểm cao hơn, hoặc Điểm bằng nhưng Thời gian ít hơn
                            if (diem > statsMap[key].topScore || (diem === statsMap[key].topScore && timeSecs < statsMap[key].topTime)) {
                                statsMap[key].topScore = diem;
                                statsMap[key].topTime = timeSecs;
                                statsMap[key].topName = hoTen; // Giữ lại nguyên vẹn Full Họ Tên
                            }
                        }
                    });
                    
                    localStorage.setItem(CACHE_KEY, JSON.stringify(statsMap));
                    renderStats(statsMap);
                }
            } catch (error) {}
        }
        setTimeout(fetchStatsSilently, 500);
    </script>
</body>
</html>
